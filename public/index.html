<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>শেয়ার করো</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@100..900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&family=Noto+Serif+Bengali:wght@100..900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Noto Serif Bengali";
            font-size: 1em;
            appearance: none;
        }

        body {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .logoP {
            position: fixed;
            top: 1.5em;
            left: 1.5em;
        }

        .logoP > b > a {
            color: black;
            text-decoration: none;
        }

        .introTextP {
            position: fixed;
            top: 8em;
        }

        .shareFilesBtn {
            position: fixed;
            bottom: 5em;
            padding: 0.1em 0.4em;
            border: 1px solid black;
            background-color: #f6f6f6;
        }

        a {
            position: fixed;
            bottom: 3em;
        }
    </style>
</head>
<body>
    <p class="logoP"><b>শেয়ার করো</b></p>

    <p class="introTextP">ছবি, ভিডিও, ডকুমেন্ট।<br>যা ইচ্ছে <b>শেয়ার করো।</b></p>

    <!-- <button class="shareFilesBtn" onclick = "window.location.href = 'sharablelink.html'">
    ফাইল সিলেক্ট করুন</button> -->

    <form id="fileUploadForm" action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="files" multiple>
        <button type="submit">ফাইল সিলেক্ট করুন</button>
    </form>
    
</body>
</html>
